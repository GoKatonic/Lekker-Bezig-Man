<head>
  <meta charset="UTF-8" />

  <title>LekkerBezigMan | Klusbedrijf</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>


<!-- Tailwind config -->
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          ink: "#1F242A",
          soft: "#F3F4F2",
          moss: "#5F7F45",
          mossDark: "#486636",
          mossSoft: "#A8BD8A",
          line: "#D8DDD7"
        },

        fontFamily: {
          sans: [
            "Inter",
            "ui-sans-serif",
            "system-ui",
            "-apple-system",
            "BlinkMacSystemFont",
            "Segoe UI",
            "sans-serif"
          ],
          display: [
            '"Stack Sans Notch"',
            "sans-serif"
          ]
        },

        boxShadow: {
          soft: "0 18px 55px rgba(31, 36, 42, 0.10), 0 8px 24px rgba(95, 127, 69, 0.08)",
          card: "0 26px 70px rgba(31, 36, 42, 0.14), 0 14px 40px rgba(95, 127, 69, 0.10)",
          premium: "0 34px 100px rgba(31, 36, 42, 0.18), 0 18px 55px rgba(95, 127, 69, 0.14), inset 0 1px 0 rgba(255, 255, 255, 0.45)",
          glow: "0 0 0 1px rgba(168, 189, 138, 0.24), 0 22px 70px rgba(95, 127, 69, 0.24), 0 0 80px rgba(168, 189, 138, 0.12)",
          darkPremium: "0 34px 100px rgba(0, 0, 0, 0.32), 0 16px 50px rgba(95, 127, 69, 0.16), inset 0 1px 0 rgba(255, 255, 255, 0.10)"
        },

        keyframes: {
          float: {
            "0%, 100%": {
              transform: "translateY(0px) rotate(0deg)"
            },
            "50%": {
              transform: "translateY(-8px) rotate(-0.5deg)"
            }
          },

          shine: {
            "0%": {
              transform: "translateX(-140%) skewX(-18deg)",
              opacity: "0"
            },
            "18%": {
              opacity: "0.65"
            },
            "55%": {
              opacity: "0.45"
            },
            "100%": {
              transform: "translateX(240%) skewX(-18deg)",
              opacity: "0"
            }
          },

          pulseGlow: {
            "0%, 100%": {
              boxShadow: "0 0 0 1px rgba(168, 189, 138, 0.18), 0 18px 50px rgba(95, 127, 69, 0.16)"
            },
            "50%": {
              boxShadow: "0 0 0 1px rgba(168, 189, 138, 0.32), 0 24px 75px rgba(95, 127, 69, 0.28)"
            }
          },

          gradientShift: {
            "0%": {
              backgroundPosition: "0% 50%"
            },
            "50%": {
              backgroundPosition: "100% 50%"
            },
            "100%": {
              backgroundPosition: "0% 50%"
            }
          }
        },

        animation: {
          float: "float 7s ease-in-out infinite",
          shine: "shine 5.5s ease-in-out infinite",
          pulseGlow: "pulseGlow 4.8s ease-in-out infinite",
          gradientShift: "gradientShift 4s ease infinite"
        }
      }
    }
  };
</script>

<link rel="preconnect" href="https://fonts.googleapis.com">
